{% extends 'stress_app/base.html' %}
{% load static %}

{% block title %}Редактирование ресурса{% endblock %}

{% block content %}
<div class="demo-header">
    <div class="query-info">
        <i class="fas fa-book-open"></i>
        <span>Редактирование ресурса</span>
    </div>
    <div class="demo-badge" style="background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);">
        <i class="fas fa-edit"></i>
        <span>Редактирование</span>
    </div>
</div>

<div class="form-container" style="max-width: 800px; margin: 0 auto;">
    <div class="card" style="background: white; border-radius: 16px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <h2 style="margin-bottom: 25px; color: #2d3748; display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-edit" style="color: #4299e1;"></i>
            Редактировать: {{ resource.title }}
        </h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568;">
                    <i class="fas fa-heading"></i> Название:
                </label>
                <input type="text" name="title" value="{{ resource.title }}" required 
                       style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1em;">
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568;">
                    <i class="fas fa-align-left"></i> Содержание:
                </label>
                <textarea name="content" rows="5" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1em;">{{ resource.content }}</textarea>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568;">
                        <i class="fas fa-tag"></i> Тип ресурса:
                    </label>
                    <select name="resource_type" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
                        {% for value, label in resource_types %}
                        <option value="{{ value }}" {% if resource.resource_type == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568;">
                        <i class="far fa-clock"></i> Длительность (мин):
                    </label>
                    <input type="number" name="duration" value="{{ resource.duration }}" 
                           style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568;">
                        <i class="fas fa-folder"></i> Категория:
                    </label>
                    <select name="category" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
                        <option value="">-- Без категории --</option>
                        {% for category in categories %}
                        <option value="{{ category.id }}" {% if resource.category and resource.category.id == category.id %}selected{% endif %}>{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568;">
                        <i class="fas fa-user-md"></i> Эксперт:
                    </label>
                    <select name="expert" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
                        <option value="">-- Без эксперта --</option>
                        {% for expert in experts %}
                        <option value="{{ expert.id }}" {% if resource.expert and resource.expert.id == expert.id %}selected{% endif %}>{{ expert.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568;">
                    <i class="fas fa-signal"></i> Уровень сложности:
                </label>
                <select name="difficulty_level" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
                    {% for value, label in difficulty_levels %}
                    <option value="{{ value }}" {% if resource.difficulty_level == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div style="display: flex; gap: 15px;">
                <button type="submit" style="flex: 1; background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%); color: white; padding: 14px; border: none; border-radius: 8px; font-size: 1.1em; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <i class="fas fa-save"></i> Сохранить изменения
                </button>
                <a href="{% url 'resource-list' %}" style="flex: 1; background: #a0aec0; color: white; padding: 14px; border-radius: 8px; text-decoration: none; text-align: center; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <i class="fas fa-times"></i> Отмена
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
