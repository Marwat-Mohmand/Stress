{% extends 'stress_app/base.html' %}
{% load static %}

{% block title %}Редактировать эксперта{% endblock %}

{% block content %}
<div class="demo-header">
    <div class="query-info">
        <i class="fas fa-user-md"></i>
        <span>Редактирование эксперта</span>
    </div>
    <div class="demo-badge" style="background: #4299e1;">
        <i class="fas fa-edit"></i>
        <span>Редактирование</span>
    </div>
</div>

<div class="form-container" style="max-width: 700px; margin: 0 auto;">
    <div class="card" style="background: white; border-radius: 16px; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        <h2 style="margin-bottom: 25px; color: #2d3748; display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-user-edit" style="color: #4299e1;"></i>
            Редактировать: {{ expert.name }}
        </h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568;">
                    <i class="fas fa-user"></i> Имя:
                </label>
                <input type="text" name="name" value="{{ expert.name }}" required 
                       style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1em;">
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568;">
                    <i class="fas fa-stethoscope"></i> Специализация:
                </label>
                <input type="text" name="specialty" value="{{ expert.specialty }}" required 
                       style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1em;">
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568;">
                    <i class="fas fa-graduation-cap"></i> Квалификация:
                </label>
                <input type="text" name="qualification" value="{{ expert.qualification }}" required 
                       style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1em;">
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568;">
                    <i class="fas fa-envelope"></i> Email:
                </label>
                <input type="email" name="email" value="{{ expert.email }}" required 
                       style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1em;">
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568;">
                    <i class="fas fa-align-left"></i> Биография:
                </label>
                <textarea name="bio" rows="5" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1em;">{{ expert.bio }}</textarea>
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button type="submit" style="flex: 1; background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%); color: white; padding: 14px; border: none; border-radius: 8px; font-size: 1.1em; font-weight: 600; cursor: pointer; transition: transform 0.2s;">
                    <i class="fas fa-save"></i> Сохранить изменения
                </button>
                <a href="{% url 'expert-list' %}" style="flex: 1; background: #a0aec0; color: white; padding: 14px; border-radius: 8px; text-decoration: none; text-align: center; font-weight: 600; transition: transform 0.2s;">
                    <i class="fas fa-times"></i> Отмена
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    button:hover, a:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    
    input:focus, textarea:focus, select:focus {
        outline: none;
        border-color: #4299e1 !important;
        box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
    }
</style>
{% endblock %}
