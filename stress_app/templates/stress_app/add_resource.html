{% extends 'stress_app/base.html' %}
{% load static %}

{% block title %}Добавить ресурс{% endblock %}

{% block content %}
<div class="demo-header">
    <div class="query-info">
        <i class="fas fa-book-open"></i>
        <span>Добавление нового ресурса</span>
    </div>
    <div class="demo-badge" style="background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);">
        <i class="fas fa-plus-circle"></i>
        <span>Создание ресурса</span>
    </div>
</div>

<div class="form-container" style="max-width: 800px; margin: 0 auto;">
    <div class="card" style="background: white; border-radius: 16px; padding: 30px;">
        <form method="POST">
            {% csrf_token %}
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Название:</label>
                <input type="text" name="title" required style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Содержание:</label>
                <textarea name="content" rows="5" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;"></textarea>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Тип ресурса:</label>
                    <select name="resource_type" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
                        {% for value, label in resource_types %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Длительность (мин):</label>
                    <input type="number" name="duration" value="10" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Категория:</label>
                    <select name="category" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
                        <option value="">-- Без категории --</option>
                        {% for category in categories %}
                        <option value="{{ category.id }}">{{ category.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Эксперт:</label>
                    <select name="expert" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
                        <option value="">-- Без эксперта --</option>
                        {% for expert in experts %}
                        <option value="{{ expert.id }}">{{ expert.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600;">Уровень сложности:</label>
                <select name="difficulty_level" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
                    {% for value, label in difficulty_levels %}
                    <option value="{{ value }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div style="display: flex; gap: 15px;">
                <button type="submit" style="flex: 1; background: #48bb78; color: white; padding: 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
                    <i class="fas fa-save"></i> Сохранить
                </button>
                <a href="{% url 'resource-list' %}" style="flex: 1; background: #a0aec0; color: white; padding: 14px; border-radius: 8px; text-decoration: none; text-align: center; font-weight: 600;">
                    Отмена
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
