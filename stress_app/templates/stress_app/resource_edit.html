{% extends 'stress_app/base.html' %}
{% load static %}

{% block title %}Редактировать: {{ resource.title }}{% endblock %}

{% block content %}
<div class="container" style="max-width: 800px; margin: 40px auto; padding: 20px;">
    <h1>Редактирование ресурса</h1>
    <a href="{% url 'resource-detail' resource.id %}">← Назад к ресурсу</a>
    
    <form method="POST" style="margin-top: 30px;">
        {% csrf_token %}
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Название:</label>
            <input type="text" name="title" value="{{ resource.title }}" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Содержание:</label>
            <textarea name="content" rows="6" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">{{ resource.content }}</textarea>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">Тип:</label>
                <select name="resource_type" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    {% for value, label in resource_types %}
                    <option value="{{ value }}" {% if resource.resource_type == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">Длительность (мин):</label>
                <input type="number" name="duration" value="{{ resource.duration }}" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
            </div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">Эксперт:</label>
                <select name="expert" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <option value="">-- Выберите эксперта --</option>
                    {% for expert in experts %}
                    <option value="{{ expert.id }}" {% if resource.expert and resource.expert.id == expert.id %}selected{% endif %}>{{ expert.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">Категория:</label>
                <select name="category" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                    <option value="">-- Без категории --</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}" {% if resource.category and resource.category.id == category.id %}selected{% endif %}>{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        
        <div style="margin-bottom: 30px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">Уровень сложности:</label>
            <select name="difficulty_level" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                {% for value, label in difficulty_levels %}
                <option value="{{ value }}" {% if resource.difficulty_level == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div style="display: flex; gap: 15px;">
            <button type="submit" style="background: #4299e1; color: white; padding: 12px 30px; border: none; border-radius: 50px; cursor: pointer;">💾 Сохранить</button>
            <a href="{% url 'resource-detail' resource.id %}" style="background: #a0aec0; color: white; padding: 12px 30px; border-radius: 50px; text-decoration: none;">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
